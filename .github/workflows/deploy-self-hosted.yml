name: Deploy
on:
  push:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy
        required: true
        default: develop

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy to VM
    runs-on: [self-hosted]
    concurrency:
      group: easyspot-vm-deploy
      cancel-in-progress: true
    environment: production
    env:
      DEPLOY_BRANCH: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.ref_name }}
    steps:
      - name: Fix workspace permissions
        run: |
          sudo chown -R "$USER:$USER" "$GITHUB_WORKSPACE" 2>/dev/null || \
          docker run --rm -v "$GITHUB_WORKSPACE:/workspace" alpine \
            sh -c "chown -R $(id -u):$(id -g) /workspace"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_BRANCH }}

      - name: Configure Docker socket permissions
        run: |
          set -euo pipefail
          # Garante que o socket do docker está acessível ao utilizador do runner
          if [ -S /var/run/docker.sock ]; then
            sudo -n usermod -aG docker $USER 2>/dev/null || true
            if ! docker ps >/dev/null 2>&1; then
              echo "Warning: Docker socket not accessible, attempting to fix permissions..."
              sudo -n chmod 666 /var/run/docker.sock 2>/dev/null || true
            fi
          fi
        continue-on-error: true

      - name: Validate runtime dependencies
        run: |
          set -euo pipefail
          docker --version || (echo "Docker not available" && exit 1)
          docker compose version || (echo "Docker Compose not available" && exit 1)

      - name: Create .env file from GitHub secrets
        run: |
          set -euo pipefail
          cd projX
          {
            echo "SONAR_DB_PASSWORD=${{ secrets.SONAR_DB_PASSWORD }}"
            echo "SONAR_GITHUB_CLIENT_ID=${{ secrets.SONAR_GITHUB_CLIENT_ID }}"
            echo "SONAR_GITHUB_CLIENT_SECRET=${{ secrets.SONAR_GITHUB_CLIENT_SECRET }}"
          } > .env
          chmod 600 .env
          echo "✓ .env file created successfully"

      - name: Deploy stack with Docker Compose
        run: |
          set -euo pipefail
          cd projX
          echo "Pulling latest images..."
          docker compose pull --ignore-pull-failures
          echo "Starting services..."
          docker compose up -d --build --remove-orphans
          echo "✓ Services deployed successfully"

      - name: Cleanup unused Docker images
        run: |
          set -euo pipefail
          docker image prune -f