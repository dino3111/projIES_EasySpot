name: Deploy
on:
  push:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy
        required: true
        default: develop

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy to VM
    runs-on: [self-hosted]
    concurrency:
      group: easyspot-vm-deploy
      cancel-in-progress: true
    environment: production
    env:
      DEPLOY_BRANCH: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.ref_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_BRANCH }}

      - name: Configure Docker socket permissions
        run: |
          set -euo pipefail
          # Ensure docker socket is accessible to current user (self-hosted only)
          if [ -S /var/run/docker.sock ]; then
            sudo -n usermod -aG docker $USER 2>/dev/null || true
            if ! docker ps >/dev/null 2>&1; then
              echo "Warning: Docker socket not accessible, attempting to fix permissions..."
              sudo -n chmod 666 /var/run/docker.sock 2>/dev/null || true
            fi
          fi
        continue-on-error: true

      - name: Validate runtime dependencies
        run: |
          set -euo pipefail
          docker --version || (echo "Docker not available" && exit 1)
          docker compose version || (echo "Docker Compose not available" && exit 1)

      - name: Deploy stack with Docker Compose
        run: |
          set -euo pipefail
          cd projX
          docker compose pull --ignore-pull-failures
          docker compose up -d --build --remove-orphans

      - name: Cleanup unused Docker images
        run: |
          set -euo pipefail
          docker image prune -f