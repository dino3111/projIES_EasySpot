name: Deploy
on:
  push:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy
        required: true
        default: develop

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy to VM
    runs-on: [self-hosted]
    concurrency:
      group: easyspot-vm-deploy
      cancel-in-progress: true
    environment: production
    env:
      DEPLOY_BRANCH: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.ref_name }}
    steps:
      - name: Fix workspace permissions
        run: |
          sudo chown -R "$USER:$USER" "$GITHUB_WORKSPACE" 2>/dev/null || \
          docker run --rm -v "$GITHUB_WORKSPACE:/workspace" alpine \
            sh -c "chown -R $(id -u):$(id -g) /workspace"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_BRANCH }}

      - name: Configure Docker socket permissions
        run: |
          set -euo pipefail
          # Garante que o socket do docker está acessível ao utilizador do runner
          if [ -S /var/run/docker.sock ]; then
            sudo -n usermod -aG docker $USER 2>/dev/null || true
            if ! docker ps >/dev/null 2>&1; then
              echo "Warning: Docker socket not accessible, attempting to fix permissions..."
              sudo -n chmod 666 /var/run/docker.sock 2>/dev/null || true
            fi
          fi
        continue-on-error: true

      - name: Validate runtime dependencies
        run: |
          set -euo pipefail
          docker --version || (echo "Docker not available" && exit 1)
          docker compose version || (echo "Docker Compose not available" && exit 1)

      - name: Create .env file from GitHub secrets
        run: |
          set -euo pipefail
          cd projX
          {
            echo "# Authentik Configuration"
            echo "AUTHENTIK_SECRET_KEY=${{ secrets.AUTHENTIK_SECRET_KEY }}"
            echo "AUTHENTIK_TAG=2024.12.3"
            echo ""
            echo "# Authentik PostgreSQL credentials"
            echo "PG_USER=authentik"
            echo "PG_DB=authentik"
            echo "PG_PASS=${{ secrets.PG_PASS }}"
            echo ""
            echo "# SonarQube Configuration"
            echo "SONAR_DB_PASSWORD=${{ secrets.SONAR_DB_PASSWORD }}"
            echo "SONAR_GITHUB_CLIENT_ID=${{ secrets.SONAR_GITHUB_CLIENT_ID }}"
            echo "SONAR_GITHUB_CLIENT_SECRET=${{ secrets.SONAR_GITHUB_CLIENT_SECRET }}"
            echo ""
            echo "# Docker Configuration"
            echo "UID=1000"
            echo "GID=1000"
          } > .env
          chmod 600 .env
          echo "✓ .env file created successfully"
          echo ""
          echo "Validating .env file..."
          grep -E "^[A-Z_]+=" .env | wc -l | xargs echo "Total variables:"
          [ -s .env ] && echo "✓ .env is not empty" || (echo "✗ .env is empty!" && exit 1)

      - name: Clean corrupted volumes and previous deployments
        run: |
          set -euo pipefail
          cd projX
          echo "Stopping existing services..."
          docker compose down -v 2>/dev/null || true
          
          echo "Removing potentially corrupted named volumes..."
          docker volume rm projx-authentik-db-data 2>/dev/null || true
          
          echo "Pruning unused system resources..."
          docker system prune -f --volumes 2>/dev/null || true
          
          echo "✓ Cleanup completed"

      - name: Validate Docker Compose configuration
        run: |
          set -euo pipefail
          cd projX
          echo "Validating compose configuration..."
          docker compose config > /dev/null && echo "✓ Configuration is valid" || exit 1
          
          echo ""
          echo "Checking environment variables..."
          docker compose config | grep -E "POSTGRES_USER|POSTGRES_PASSWORD|POSTGRES_DB" | head -5

      - name: Deploy stack with Docker Compose
        run: |
          set -euo pipefail
          cd projX
          echo "Pulling latest images..."
          docker compose pull --ignore-pull-failures
          echo "Starting services..."
          docker compose up -d --build --remove-orphans
          echo "✓ Services deployed successfully"

      - name: Wait for services to be healthy
        run: |
          set -euo pipefail
          cd projX
          echo "Waiting for services to become healthy..."
          
          max_attempts=60
          attempt=0
          
          while [ $attempt -lt $max_attempts ]; do
            attempt=$((attempt + 1))
            echo "Attempt $attempt/$max_attempts..."
            
            # Check if authentik-db is healthy
            if docker compose ps authentik-db 2>/dev/null | grep -q "healthy"; then
              echo "✓ authentik-db is healthy"
              break
            fi
            
            # Check if container exited with error
            if docker compose ps authentik-db 2>/dev/null | grep -q "Exit"; then
              echo "✗ authentik-db failed to start"
              echo ""
              echo "Logs from authentik-db:"
              docker compose logs authentik-db | tail -50
              exit 1
            fi
            
            sleep 5
          done
          
          if [ $attempt -eq $max_attempts ]; then
            echo "✗ Timeout waiting for services"
            docker compose ps
            docker compose logs authentik-db | tail -50
            exit 1
          fi
          
          echo "✓ All critical services are healthy"
          docker compose ps

      - name: Cleanup unused Docker images
        run: |
          set -euo pipefail
          docker image prune -f