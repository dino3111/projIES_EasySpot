---
name: SonarQube Analysis

on:
  pull_request:
    branches: [master, develop]
    paths:
      - 'sonar-project.properties'
      - '.github/workflows/sonarqube.yml'
      - 'projX/api-easyspot/**'
      - 'projX/web-easyspot/src/**'

concurrency:
  group: sonarqube-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SONAR_USER_HOME: ~/.sonar

jobs:
  sonarqube:
    name: SonarQube scan
    runs-on: [self-hosted]
    steps:
      - name: Fix workspace permissions
        run: |
          sudo chown -R "$USER:$USER" "$GITHUB_WORKSPACE" 2>/dev/null || \
          docker run --rm -v "$GITHUB_WORKSPACE:/workspace" alpine \
            sh -c "chown -R $(id -u):$(id -g) /workspace"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        if: hashFiles('projX/api-easyspot/pom.xml') != ''
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build backend
        if: hashFiles('projX/api-easyspot/pom.xml') != ''
        run: cd projX/api-easyspot && ./mvnw compile -q

      - name: Resolve reachable SonarQube URL
        env:
          SONAR_HOST_URL_SECRET: ${{ secrets.SONAR_HOST_URL }}
        run: |
          set -euo pipefail

          if [ -z "${SONAR_HOST_URL_SECRET:-}" ]; then
            echo "SONAR_HOST_URL secret is empty."
            exit 1
          fi

          base_url="${SONAR_HOST_URL_SECRET%/}"
          # Preserve explicit context path if provided in SONAR_HOST_URL.
          # Only default to /sonar when URL has no path component.
          case "$base_url" in
            */sonar)
              base_with_context="$base_url"
              ;;
            http://*/*|https://*/*)
              base_with_context="$base_url"
              ;;
            *)
              base_with_context="$base_url/sonar"
              ;;
          esac

          localhost_url="$(printf '%s' "$base_with_context" | sed -E 's#^(https?://)[^/:]+#\1localhost#')"
          loopback_url="$(printf '%s' "$base_with_context" | sed -E 's#^(https?://)[^/:]+#\1127.0.0.1#')"

          # Prefer local resolution first on self-hosted runners to avoid host firewall/NAT issues.
          candidates=("$localhost_url" "$loopback_url" "$base_with_context")

          for candidate in "${candidates[@]}"; do
            status_endpoint="${candidate}/api/system/status"
            http_code="$(curl -sS -o /dev/null -w '%{http_code}' --max-time 10 "$status_endpoint" || true)"

            # Consider endpoint reachable even if SonarQube is still warming up or waiting for DB migration.
            case "$http_code" in
              200|204|301|302|303|307|308|401|403|503)
                echo "Using SonarQube URL: $candidate (status=$http_code)"
                echo "SONAR_HOST_URL_EFFECTIVE=$candidate" >> "$GITHUB_ENV"
                exit 0
                ;;
            esac

            echo "SonarQube not reachable via $status_endpoint (status=$http_code)"
          done

          echo "SonarQube endpoint is unreachable from this runner: $base_url"
          exit 1

      - name: SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL_EFFECTIVE }}
        run: |
          curl -sSLo sonar-scanner.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-7.0.2.4839.zip
          unzip -qo sonar-scanner.zip
          export PATH="$PWD/sonar-scanner-7.0.2.4839/bin:$PATH"
          
          # Community Edition does not support pull request analysis
          # Use branch analysis instead with automatic target branch detection
          sonar-scanner \
            -Dsonar.branch.name=${{ github.head_ref || github.ref_name }}

      - name: Quality Gate check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL_EFFECTIVE }}
