---
name: SonarQube Analysis

on:
  pull_request:
    branches: [master, develop]
    paths:
      - 'sonar-project.properties'
      - '.github/workflows/sonarqube.yml'
      - 'projX/api-easyspot/**'
      - 'projX/web-easyspot/src/**'

concurrency:
  group: sonarqube-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SONAR_USER_HOME: ~/.sonar

jobs:
  sonarqube:
    name: SonarQube scan
    runs-on: [self-hosted]
    steps:
      - name: Fix workspace permissions
        run: |
          sudo chown -R "$USER:$USER" "$GITHUB_WORKSPACE" 2>/dev/null || \
          docker run --rm -v "$GITHUB_WORKSPACE:/workspace" alpine \
            sh -c "chown -R $(id -u):$(id -g) /workspace"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        if: hashFiles('projX/api-easyspot/pom.xml') != ''
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build backend
        if: hashFiles('projX/api-easyspot/pom.xml') != ''
        run: cd projX/api-easyspot && ./mvnw compile -q

      - name: Install SonarScanner CLI
        shell: bash
        run: |
          set -euo pipefail

          SCANNER_VERSION="7.0.2.4839"
          ARCH="$(uname -m)"

          case "$ARCH" in
            x86_64|amd64)
              DIST="linux-x64"
              ;;
            aarch64|arm64)
              DIST="linux-aarch64"
              ;;
            *)
              echo "Unsupported architecture: $ARCH" >&2
              exit 1
              ;;
          esac

          SCANNER_ZIP="sonar-scanner-cli-${SCANNER_VERSION}-${DIST}.zip"
          SCANNER_URL="https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/${SCANNER_ZIP}"

          curl -fsSL "$SCANNER_URL" -o "${RUNNER_TEMP}/${SCANNER_ZIP}"
          unzip -q -o "${RUNNER_TEMP}/${SCANNER_ZIP}" -d "$RUNNER_TEMP"

          echo "${RUNNER_TEMP}/sonar-scanner-${SCANNER_VERSION}-${DIST}/bin" >> "$GITHUB_PATH"

      - name: Validate SonarQube reachability
        shell: bash
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          set -euo pipefail

          if [ -z "${SONAR_HOST_URL:-}" ]; then
            echo "SONAR_HOST_URL secret is empty" >&2
            exit 1
          fi

          for attempt in 1 2 3; do
            if curl -fsS --connect-timeout 20 --max-time 40 "${SONAR_HOST_URL%/}/api/server/version" >/dev/null; then
              echo "SonarQube is reachable"
              exit 0
            fi
            echo "SonarQube not reachable (attempt ${attempt}/3). Retrying..."
          done

          echo "SonarQube endpoint is unreachable from this runner: ${SONAR_HOST_URL}" >&2
          exit 1

      - name: SonarQube Scan + Quality Gate
        run: |
          set -euo pipefail

          for attempt in 1 2; do
            if sonar-scanner \
              -Dproject.settings=sonar-project.properties \
              -Dsonar.host.url="${{ secrets.SONAR_HOST_URL }}" \
              -Dsonar.token="${{ secrets.SONAR_TOKEN }}" \
              -Dsonar.pullrequest.key="${{ github.event.pull_request.number }}" \
              -Dsonar.pullrequest.branch="${{ github.head_ref }}" \
              -Dsonar.pullrequest.base="${{ github.base_ref }}" \
              -Dsonar.qualitygate.wait=true \
              -Dsonar.scanner.connectTimeout=60 \
              -Dsonar.scanner.socketTimeout=300; then
              exit 0
            fi

            if [ "$attempt" -lt 2 ]; then
              echo "Sonar scanner failed on attempt ${attempt}. Retrying once..."
            fi
          done

          echo "Sonar scanner failed after retries" >&2
          exit 1
        timeout-minutes: 20
