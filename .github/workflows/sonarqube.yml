---
name: SonarQube Analysis

on:
  pull_request:
    branches: [master, develop]
    paths:
      - 'sonar-project.properties'
      - '.github/workflows/sonarqube.yml'
      - 'projX/api-easyspot/**'
      - 'projX/web-easyspot/src/**'

concurrency:
  group: sonarqube-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SONAR_USER_HOME: ~/.sonar

jobs:
  sonarqube:
    name: SonarQube scan
    runs-on: [self-hosted]
    steps:
      - name: Fix workspace permissions
        run: |
          sudo chown -R "$USER:$USER" "$GITHUB_WORKSPACE" 2>/dev/null || \
          docker run --rm -v "$GITHUB_WORKSPACE:/workspace" alpine \
            sh -c "chown -R $(id -u):$(id -g) /workspace"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        if: hashFiles('projX/api-easyspot/pom.xml') != ''
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build backend
        if: hashFiles('projX/api-easyspot/pom.xml') != ''
        run: cd projX/api-easyspot && ./mvnw compile -q

      - name: Resolve reachable SonarQube URL
        env:
          SONAR_HOST_URL_SECRET: ${{ secrets.SONAR_HOST_URL }}
        run: |
          set -euo pipefail

          if [ -z "${SONAR_HOST_URL_SECRET:-}" ]; then
            echo "SONAR_HOST_URL secret is empty."
            exit 1
          fi

          base_url="${SONAR_HOST_URL_SECRET%/}"
          localhost_url="$(printf '%s' "$base_url" | sed -E 's#^(https?://)[^/:]+#\1localhost#')"
          loopback_url="$(printf '%s' "$base_url" | sed -E 's#^(https?://)[^/:]+#\1127.0.0.1#')"

          for candidate in "$base_url" "$localhost_url" "$loopback_url"; do
            status_endpoint="${candidate}/api/system/status"
            if curl -fsSL --max-time 10 "$status_endpoint" >/dev/null; then
              echo "Using SonarQube URL: $candidate"
              echo "SONAR_HOST_URL_EFFECTIVE=$candidate" >> "$GITHUB_ENV"
              exit 0
            fi
          done

          echo "SonarQube endpoint is unreachable from this runner: $base_url"
          exit 1

      - name: SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL_EFFECTIVE }}
        run: |
          curl -sSLo sonar-scanner.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-7.0.2.4839.zip
          unzip -qo sonar-scanner.zip
          export PATH="$PWD/sonar-scanner-7.0.2.4839/bin:$PATH"
          sonar-scanner \
            -Dsonar.pullrequest.key=${{ github.event.pull_request.number }} \
            -Dsonar.pullrequest.branch=${{ github.head_ref }} \
            -Dsonar.pullrequest.base=${{ github.base_ref }}

      - name: Quality Gate check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL_EFFECTIVE }}
