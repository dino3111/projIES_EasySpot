---
name: Pre-commit checks (PRs)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: ["master", "develop"]

concurrency:
  group: pre-commit-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pre-commit:
    runs-on: [self-hosted]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
        continue-on-error: true  # Self-hosted may not have all Python versions

      - name: Set up Java (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache pre-commit environments (aggressive for Pi)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pre-commit
            ~/.cache/pip
            ~/.pre-commit-cache
          key: ${{ runner.os }}-precommit-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-precommit-
            ${{ runner.os }}-

      - name: Install project dev tools
        run: |
          python -m pip install --upgrade pip --quiet
          pip install pre-commit --quiet
        timeout-minutes: 10

      - name: Run pre-commit on changed files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BASE_REF="origin/${{ github.event.pull_request.base.ref }}"
          git fetch origin ${{ github.event.pull_request.base.ref }} --depth=1
          pre-commit run \
            --from-ref "$BASE_REF" \
            --to-ref HEAD \
            --show-diff-on-failure
