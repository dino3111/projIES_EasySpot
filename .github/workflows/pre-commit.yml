---
name: Pre-commit checks (PRs)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: ["master", "develop"]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Java (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install OS deps (for some linters)
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck # optional helper

      - name: Install project dev tools
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit
          # Install sqlfluff so the sqlfluff-lint hook is available
          pip install sqlfluff

      - name: Run pre-commit on changed files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Run only on files changed in the PR to speed up runs
          git fetch origin ${{ github.event.pull_request.base.ref }} \
            --depth=1
          CHANGED=$(git diff --name-only \
            origin/${{ github.event.pull_request.base.ref }}...HEAD)
          if [ -z "$CHANGED" ]; then
            echo "No changed files detected."
            exit 0
          fi
          # Filter out deleted files and pass to pre-commit
          files=""
          for f in $CHANGED; do
            if [ -f "$f" ]; then
              files="$files $f"
            fi
          done
          if [ -z "$files" ]; then
            echo "No existing files to check."
            exit 0
          fi
          pre-commit run --files $files
