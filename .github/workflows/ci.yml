---
name: CI - repository validation

on:
  push:
    branches: ["master", "develop"]
    paths:
      - '.github/workflows/ci.yml'
      - '.github/workflows/pre-commit.yml'
      - '.github/workflows/sonarqube.yml'
      - '.github/workflows/release.yml'
      - '.github/workflows/deploy-self-hosted.yml'
      - '**/*.yml'
      - '**/*.yaml'
      - '**/*.json'
      - '**/*.md'
      - '**/Dockerfile'
      - '**/*.dockerfile'
      - 'projX/api-easyspot/**'
      - 'projX/web-easyspot/**'
      - 'projX/pom.xml'
  pull_request:
    branches: ["master", "develop"]
    paths:
      - '.github/workflows/ci.yml'
      - '.github/workflows/pre-commit.yml'
      - '.github/workflows/sonarqube.yml'
      - '.github/workflows/release.yml'
      - '.github/workflows/deploy-self-hosted.yml'
      - '**/*.yml'
      - '**/*.yaml'
      - '**/*.json'
      - '**/*.md'
      - '**/Dockerfile'
      - '**/*.dockerfile'
      - 'projX/api-easyspot/**'
      - 'projX/web-easyspot/**'
      - 'projX/pom.xml'

concurrency:
  group: ci-config-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-configs:
    name: Lint configs (YAML / JSON / Dockerfile)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
        continue-on-error: true 

      - name: Cache pre-commit environments (aggressive for Pi)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pre-commit
            ~/.cache/pip
            ~/.pre-commit-cache
          key: ${{ runner.os }}-ci-precommit-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-ci-precommit-
            ${{ runner.os }}-ci-

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip --quiet
          pip install pre-commit --quiet
        timeout-minutes: 10

      - name: Run config hooks
        run: |
          pre-commit run --all-files

  test-backend:
    name: Backend tests (unit + integration)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java (Temurin 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run unit and integration tests
        run: |
          cd projX/api-easyspot
          ./mvnw -B clean verify
        timeout-minutes: 20

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            projX/api-easyspot/target/surefire-reports/
            projX/api-easyspot/target/failsafe-reports/
            projX/api-easyspot/target/site/jacoco/
          retention-days: 30

  test-frontend-build:
    name: Frontend build validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: projX/web-easyspot/package-lock.json

      - name: Install dependencies
        run: |
          cd projX/web-easyspot
          npm ci

      - name: Build frontend
        run: |
          cd projX/web-easyspot
          npm run build
