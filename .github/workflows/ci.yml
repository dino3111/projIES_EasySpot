---
name: CI - repository validation

on:
  push:
    branches: ["master", "develop"]
    paths:
      - '.github/workflows/ci.yml'
      - '.github/workflows/pre-commit.yml'
      - '.github/workflows/sonarqube.yml'
      - '.github/workflows/release.yml'
      - '.github/workflows/deploy-self-hosted.yml'
      - '**/*.yml'
      - '**/*.yaml'
      - '**/*.json'
      - '**/*.md'
      - '**/Dockerfile'
      - '**/*.dockerfile'
  pull_request:
    branches: ["master", "develop"]
    paths:
      - '.github/workflows/ci.yml'
      - '.github/workflows/pre-commit.yml'
      - '.github/workflows/sonarqube.yml'
      - '.github/workflows/release.yml'
      - '.github/workflows/deploy-self-hosted.yml'
      - '**/*.yml'
      - '**/*.yaml'
      - '**/*.json'
      - '**/*.md'
      - '**/Dockerfile'
      - '**/*.dockerfile'

concurrency:
  group: ci-config-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-configs:
    name: Lint configs (YAML / JSON / Dockerfile)
    runs-on: [self-hosted]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pre-commit environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: ${{ runner.os }}-ci-precommit-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-ci-precommit-

      - name: Cache pip downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-ci-pip-precommit-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-ci-pip-precommit-

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit

      - name: Run config hooks
        run: |
          pre-commit run --all-files check-yaml check-json hadolint-docker
