---
name: CI - repository validation

on:
  push:
    branches: ["master", "develop"]
    paths:
      - '.github/workflows/ci.yml'
      - '.github/workflows/pre-commit.yml'
      - '.github/workflows/sonarqube.yml'
      - '.github/workflows/release.yml'
      - '.github/workflows/deploy-self-hosted.yml'
      - '**/*.yml'
      - '**/*.yaml'
      - '**/*.json'
      - '**/*.md'
      - '**/Dockerfile'
      - '**/*.dockerfile'
  pull_request:
    branches: ["master", "develop"]
    paths:
      - '.github/workflows/ci.yml'
      - '.github/workflows/pre-commit.yml'
      - '.github/workflows/sonarqube.yml'
      - '.github/workflows/release.yml'
      - '.github/workflows/deploy-self-hosted.yml'
      - '**/*.yml'
      - '**/*.yaml'
      - '**/*.json'
      - '**/*.md'
      - '**/Dockerfile'
      - '**/*.dockerfile'

concurrency:
  group: ci-config-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-configs:
    name: Lint configs (YAML / JSON / Markdown / Dockerfile)
    runs-on: [self-hosted]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Super-Linter (light, config files)
        uses: github/super-linter@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: false
          VALIDATE_YAML: true
          VALIDATE_JSON: true
          VALIDATE_MARKDOWN: true
          VALIDATE_DOCKERFILE: true
          DEFAULT_BRANCH: master
          YAML_CONFIG_FILETYPES: .yaml,.yml
