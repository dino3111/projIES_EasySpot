---
name: CI - repository validation

on:
  push:
    branches: ["master", "develop"]
    paths:
      - '.github/workflows/ci.yml'
      - '.github/workflows/pre-commit.yml'
      - '.github/workflows/sonarqube.yml'
      - '.github/workflows/release.yml'
      - '.github/workflows/deploy-self-hosted.yml'
      - '**/*.yml'
      - '**/*.yaml'
      - '**/*.json'
      - '**/*.md'
      - '**/Dockerfile'
      - '**/*.dockerfile'
      - 'projX/api-easyspot/**'
      - 'projX/pom.xml'
  pull_request:
    branches: ["master", "develop"]
    paths:
      - '.github/workflows/ci.yml'
      - '.github/workflows/pre-commit.yml'
      - '.github/workflows/sonarqube.yml'
      - '.github/workflows/release.yml'
      - '.github/workflows/deploy-self-hosted.yml'
      - '**/*.yml'
      - '**/*.yaml'
      - '**/*.json'
      - '**/*.md'
      - '**/Dockerfile'
      - '**/*.dockerfile'
      - 'projX/api-easyspot/**'
      - 'projX/pom.xml'

concurrency:
  group: ci-config-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-configs:
    name: Lint configs (YAML / JSON / Dockerfile)
    runs-on: [self-hosted]
    steps:
      - name: Fix workspace permissions
        run: |
          sudo chown -R "$USER:$USER" "$GITHUB_WORKSPACE" 2>/dev/null || \
          docker run --rm -v "$GITHUB_WORKSPACE:/workspace" alpine \
            sh -c "chown -R $(id -u):$(id -g) /workspace"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
        continue-on-error: true 

      - name: Cache pre-commit environments (aggressive for Pi)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pre-commit
            ~/.cache/pip
            ~/.pre-commit-cache
          key: ${{ runner.os }}-ci-precommit-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-ci-precommit-
            ${{ runner.os }}-ci-

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip --quiet
          pip install pre-commit --quiet
        timeout-minutes: 10

      - name: Run config hooks
        run: |
          pre-commit run --all-files

  test-backend:
    name: Backend tests (unit + integration)
    runs-on: [self-hosted]
    steps:
      - name: Fix workspace permissions
        run: |
          sudo chown -R "$USER:$USER" "$GITHUB_WORKSPACE" 2>/dev/null || \
          docker run --rm -v "$GITHUB_WORKSPACE:/workspace" alpine \
            sh -c "chown -R $(id -u):$(id -g) /workspace"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java (Temurin 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run unit and integration tests
        run: |
          cd projX/api-easyspot
          ./mvnw -B clean verify
        timeout-minutes: 20

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            projX/api-easyspot/target/surefire-reports/
            projX/api-easyspot/target/failsafe-reports/
            projX/api-easyspot/target/site/jacoco/
          retention-days: 30

  api-contract-tests:
    name: API contract tests (Newman)
    runs-on: [self-hosted]
    needs: test-backend
    steps:
      - name: Fix workspace permissions
        run: |
          sudo chown -R "$USER:$USER" "$GITHUB_WORKSPACE" 2>/dev/null || \
          docker run --rm -v "$GITHUB_WORKSPACE:/workspace" alpine \
            sh -c "chown -R $(id -u):$(id -g) /workspace"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java (Temurin 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyJWT
        run: pip install PyJWT cryptography --quiet

      - name: Set up Node.js for Newman
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Start PostgreSQL
        run: |
          docker run -d --name postman-postgres \
            -e POSTGRES_DB=easyspot_postman \
            -e POSTGRES_USER=easyspot \
            -e POSTGRES_PASSWORD=easyspot \
            -p 5433:5432 \
            postgres:16-alpine
          until docker exec postman-postgres pg_isready -U easyspot; do sleep 1; done

      - name: Start Kafka
        run: |
          docker run -d --name postman-kafka \
            -e KAFKA_NODE_ID=1 \
            -e KAFKA_PROCESS_ROLES=broker,controller \
            -e KAFKA_LISTENERS=PLAINTEXT://:9093,CONTROLLER://:9094 \
            -e KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9093 \
            -e KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER \
            -e KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT \
            -e KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9094 \
            -e KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1 \
            -e KAFKA_AUTO_CREATE_TOPICS_ENABLE=true \
            --network host \
            apache/kafka-native:3.8.0

      - name: Build application JAR
        run: |
          cd projX/api-easyspot
          ./mvnw -B package -DskipTests -q

      - name: Start application with postman profile
        env:
          POSTMAN_DB_URL: jdbc:postgresql://localhost:5433/easyspot_postman
          POSTMAN_DB_USER: easyspot
          POSTMAN_DB_PASS: easyspot
          POSTMAN_KAFKA_SERVERS: localhost:9093
        run: |
          cd projX/api-easyspot
          java -jar target/api-easyspot-*.jar \
            --spring.profiles.active=postman \
            --server.port=8080 &
          echo $! > /tmp/app.pid
          until curl -sf http://localhost:8080/actuator/health; do sleep 2; done
        timeout-minutes: 3

      - name: Generate test JWTs
        run: |
          echo "${{ secrets.POSTMAN_JWT_PRIVATE_KEY }}" > /tmp/postman-test.pem
          DRIVER_TOKEN=$(python3 projX/postman/generate-jwt.py /tmp/postman-test.pem DRIVER)
          MANAGER_TOKEN=$(python3 projX/postman/generate-jwt.py /tmp/postman-test.pem MANAGER)
          echo "DRIVER_TOKEN=$DRIVER_TOKEN" >> $GITHUB_ENV
          echo "MANAGER_TOKEN=$MANAGER_TOKEN" >> $GITHUB_ENV
          rm /tmp/postman-test.pem

      - name: Run Newman
        run: |
          newman run projX/postman/EasySpot-Vehicle.postman_collection.json \
            --env-var "baseUrl=http://localhost:8080" \
            --env-var "driverToken=$DRIVER_TOKEN" \
            --env-var "managerToken=$MANAGER_TOKEN" \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export projX/postman/newman-report.html \
            --bail

      - name: Stop application and containers
        if: always()
        run: |
          [ -f /tmp/app.pid ] && kill $(cat /tmp/app.pid) || true
          docker rm -f postman-postgres postman-kafka || true

      - name: Upload Newman report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: projX/postman/newman-report.html
          retention-days: 30
