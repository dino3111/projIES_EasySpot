---
name: Release

on:
  push:
    branches:
      - master

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create releases/tags
      packages: write   # required to publish packages (if needed)
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: .github/semantic-release/package.json

      - name: Install semantic-release plugins
        run: |
          cd .github/semantic-release
          npm install --no-audit --no-fund --package-lock=false

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cd .github/semantic-release && npx semantic-release
