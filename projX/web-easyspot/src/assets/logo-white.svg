<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.15)"/>
    </linearGradient>
  </defs>
  <!-- Icon badge -->
  <rect x="4" y="10" width="40" height="40" rx="10" fill="url(#bg)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <text x="24" y="36" font-family="Arial, sans-serif" font-size="20" font-weight="900" fill="white" text-anchor="middle">P</text>
  <!-- Wordmark -->
  <text x="54" y="38" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="white">Easy</text>
  <text x="104" y="38" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#c4baf0">Spot</text>
</svg>
