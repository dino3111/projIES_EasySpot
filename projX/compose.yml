services:
  frontend:
    build:
      context: ./web-easyspot
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./web-easyspot:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    restart: unless-stopped

  postgres:
    image: postgres:16
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      start_period: 30s
      interval: 10s
      retries: 10
      timeout: 5s
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    environment:
      POSTGRES_PASSWORD: ${PG_PASS}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_DB: ${PG_DB}
      SONAR_DB_PASSWORD: ${SONAR_DB_PASSWORD}
      APP_DB_USER: ${APP_DB_USER}
      APP_DB_PASS: ${APP_DB_PASS}
      APP_DB: ${APP_DB}
    ports:
      - "5432:5432"

  authentik-redis:
    image: redis:7.2-alpine
    command: --save 60 1 --loglevel warning
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 3s
    volumes:
      - authentik-redis-data:/data

  authentik-server:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_TAG}
    restart: unless-stopped
    command: server
    environment:
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__USER: ${PG_USER}
      AUTHENTIK_POSTGRESQL__NAME: ${PG_DB}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_BOOTSTRAP_PASSWORD: ${AUTHENTIK_BOOTSTRAP_PASSWORD:-akadmin}
      AUTHENTIK_BOOTSTRAP_TOKEN: ${AUTHENTIK_BOOTSTRAP_TOKEN:-}
      AUTHENTIK_WEB__PATH: /authentik/
    ports:
      - "9000:9000"
    volumes:
      - authentik-media:/media
      - authentik-certs:/certs
      - ./authentik-custom.css:/web/dist/custom.css:ro
    depends_on:
      postgres:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy

  authentik-worker:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_TAG}
    restart: unless-stopped
    command: worker
    user: root
    environment:
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__USER: ${PG_USER}
      AUTHENTIK_POSTGRESQL__NAME: ${PG_DB}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_BOOTSTRAP_PASSWORD: ${AUTHENTIK_BOOTSTRAP_PASSWORD:-akadmin}
      AUTHENTIK_BOOTSTRAP_TOKEN: ${AUTHENTIK_BOOTSTRAP_TOKEN:-}
      AUTHENTIK_WEB__PATH: /authentik/
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - authentik-media:/media
      - authentik-certs:/certs
      - ./authentik-custom.css:/web/dist/custom.css:ro
    depends_on:
      postgres:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.local.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      authentik-server:
        condition: service_started
    restart: unless-stopped

  nginx-ci:
    image: nginx:1.27-alpine
    profiles:
      - ci
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      sonarqube:
        condition: service_started
      authentik-server:
        condition: service_started
    restart: unless-stopped

  api:
    build:
      context: ./api-easyspot
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      AUTHENTIK_JWK_SET_URI: ${AUTHENTIK_JWK_SET_URI:-http://authentik-server:9000/authentik/application/o/easyspot/jwks/}
      AUTHENTIK_ISSUER_URI: ${AUTHENTIK_ISSUER_URI:-http://localhost:9000/authentik/}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      DB_URL: jdbc:postgresql://postgres:5432/${APP_DB}
      DB_USERNAME: ${APP_DB_USER}
      DB_PASSWORD: ${APP_DB_PASS}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      FIREBASE_API_KEY: ${FIREBASE_API_KEY:-}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY:-}
      R2_SECRET_KEY: ${R2_SECRET_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-easyspot-media}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      authentik-server:
        condition: service_started

  sonarqube:
    image: sonarqube:community
    profiles:
      - ci
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://postgres:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: ${SONAR_DB_PASSWORD}
      SONAR_AUTH_GITHUB_ENABLED: "true"
      SONAR_AUTH_GITHUB_CLIENTID: ${SONAR_GITHUB_CLIENT_ID}
      SONAR_AUTH_GITHUB_CLIENTSECRET: ${SONAR_GITHUB_CLIENT_SECRET}
      SONAR_AUTH_GITHUB_ALLOWUSERSTOSIGNUP: "true"
      SONAR_WEB_CONTEXT: /sonar
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-extensions:/opt/sonarqube/extensions
      - sonarqube-logs:/opt/sonarqube/logs
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/sonar/api/system/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      start_period: 30s
      interval: 10s
      retries: 10
      timeout: 5s
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
      - ./init-timescale.sh:/docker-entrypoint-initdb.d/init-timescale.sh:ro
    environment:
      POSTGRES_PASSWORD: ${APP_DB_PASS}
      POSTGRES_USER: ${APP_DB_USER}
      POSTGRES_DB: ${TS_DB}
    ports:
      - "5433:5432"

  kafka:
    image: apache/kafka:3.8.0
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://${KAFKA_ADVERTISED_HOST:-kafka}:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      start_period: 30s
      interval: 10s
      retries: 10
      timeout: 10s

  stripe-cli:
    image: stripe/stripe-cli:v1.40.6
    restart: on-failure:3
    profiles:
      - stripe
    entrypoint:
      - /bin/sh
      - /stripe-cli-entrypoint.sh
    environment:
      STRIPE_WEBHOOK_FORWARD_TO: ${STRIPE_WEBHOOK_FORWARD_TO:-}
    volumes:
      - ./stripe-cli-entrypoint.sh:/stripe-cli-entrypoint.sh:ro
      - ./.stripe_api_key:/run/secrets/stripe_api_key:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres-data:
  timescaledb-data:
  authentik-redis-data:
  authentik-media:
  authentik-certs:
  sonarqube-data:
  sonarqube-extensions:
  sonarqube-logs:
  kafka-data:
