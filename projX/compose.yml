services:
  frontend:
    build:
      context: ./web-easyspot
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./web-easyspot:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "9000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      sonarqube:
        condition: service_started
    environment:
      - SONARQUBE_HOST=sonarqube
      - SONARQUBE_PORT=9000
    restart: unless-stopped

  sonarqube-init:
    image: busybox
    command: >
      sh -c "chown -R 1000:1000 /opt/sonarqube/data /opt/sonarqube/extensions /opt/sonarqube/logs && 
             chown -R 999:999 /var/lib/postgresql/data"
    volumes:
      - ./sonarqube_data:/opt/sonarqube/data
      - ./sonarqube_extensions:/opt/sonarqube/extensions
      - ./sonarqube_logs:/opt/sonarqube/logs
      - ./sonarqube_db:/var/lib/postgresql/data

  sonarqube:
    image: sonarqube:community
    depends_on:
      sonarqube-init:
        condition: service_completed_successfully
      sonarqube-db:
        condition: service_started
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: ${SONAR_DB_PASSWORD}
      SONAR_AUTH_GITHUB_ENABLED: "true"
      SONAR_AUTH_GITHUB_CLIENTID: ${SONAR_GITHUB_CLIENT_ID}
      SONAR_AUTH_GITHUB_CLIENTSECRET: ${SONAR_GITHUB_CLIENT_SECRET}
      SONAR_AUTH_GITHUB_ALLOWUSERSTOSIGNUP: "true"
      SONAR_WEB_CONTEXT: /sonar
    volumes:
      - ./sonarqube_data:/opt/sonarqube/data
      - ./sonarqube_extensions:/opt/sonarqube/extensions
      - ./sonarqube_logs:/opt/sonarqube/logs
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/sonar/api/system/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  sonarqube-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: ${SONAR_DB_PASSWORD}
      POSTGRES_DB: sonar
    volumes:
      - ./sonarqube_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped