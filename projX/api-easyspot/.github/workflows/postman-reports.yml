name: Postman Reports

on:
  pull_request:
  push:
    branches: ["main", "develop"]

jobs:
  reports-postman:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: easyspot
          POSTGRES_PASSWORD: easyspot
          POSTGRES_DB: easyspot_postman
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U easyspot -d easyspot_postman"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Newman
        run: npm install --global newman

      - name: Prepare multipart fixtures
        run: ./postman/scripts/prepare-fixtures.sh

      - name: Build project
        run: ./mvnw -B -DskipTests package

      - name: Start API with postman profile
        env:
          SPRING_PROFILES_ACTIVE: postman
          POSTMAN_DB_URL: jdbc:postgresql://localhost:5433/easyspot_postman
          POSTMAN_DB_USER: easyspot
          POSTMAN_DB_PASS: easyspot
          POSTMAN_KAFKA_SERVERS: localhost:9093
          POSTMAN_JWT_SECRET: easyspot-postman-secret-key-change-me-2026
          STRIPE_API_KEY: sk_test_postman_dummy_key
        run: |
          ./mvnw -B spring-boot:run > app.log 2>&1 &
          echo $! > app.pid

      - name: Wait for health endpoint
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8080/actuator/health >/dev/null; then
              echo "API is up"
              exit 0
            fi
            sleep 2
          done
          echo "API did not become healthy in time"
          tail -n 200 app.log || true
          exit 1

      - name: Run Postman collections
        run: ./postman/scripts/run-reports-newman.sh

      - name: Stop API
        if: always()
        run: |
          if [ -f app.pid ]; then
            kill "$(cat app.pid)" || true
          fi

      - name: Upload Newman artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postman-reports-artifacts
          path: |
            newman/
            app.log
          if-no-files-found: warn
