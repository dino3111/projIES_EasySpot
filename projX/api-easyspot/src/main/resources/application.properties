spring.application.name=api-easyspot

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${AUTHENTIK_JWK_SET_URI:http://localhost:9000/authentik/application/o/easyspot/jwks/}
authentik.issuer=${AUTHENTIK_ISSUER_URI:http://localhost/authentik/application/o/easyspot/}
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=${DB_URL:jdbc:postgresql://10.243.106.1:5432/easyspot}
spring.datasource.username=${DB_USERNAME:easyspot}
spring.datasource.password=${DB_PASSWORD:}
timescale.datasource.url=${TIMESCALE_DB_URL:jdbc:postgresql://10.243.106.1:5433/easyspot_ts}
timescale.datasource.username=${TIMESCALE_DB_USERNAME:easyspot}
timescale.datasource.password=${TIMESCALE_DB_PASSWORD:}
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:10.243.106.1:9092}
scraper.base-url=${SCRAPER_BASE_URL:http://scraper-vehicle:4100}
scraper.api-key=${SCRAPER_API_KEY:}
autodoc.vehicle-image-base=${AUTODOC_VEHICLE_IMAGE_BASE:https://scdn.autodoc.de/vehicles/800x287}
r2.account-id=${R2_ACCOUNT_ID:}
r2.access-key=${R2_ACCESS_KEY:}
r2.secret-key=${R2_SECRET_KEY:}
r2.bucket=${R2_BUCKET:easyspot-media}
r2.public-url=${R2_PUBLIC_URL:}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.oauth2=DEBUG

app.frontend.url=${APP_FRONTEND_URL:http://localhost/}
stripe.api.key=${STRIPE_API_KEY:}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:}
authentik.api.url=${AUTHENTIK_API_URL:http://authentik-server:9000/authentik}
authentik.api.token=${AUTHENTIK_TOKEN:}

# Email (SMTP) — required for booking confirmation emails
# Dev: use Mailtrap (smtp.mailtrap.io:587) or Gmail App Password
spring.mail.host=${MAIL_HOST:smtp.mailtrap.io}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.from=${MAIL_FROM:noreply@easyspot.pt}

# Internal service auth token for virtual sensors bootstrap context endpoint
simulation.service-token=${SIMULATION_SERVICE_TOKEN:}
easyspot.ocr.kafka.topic=${KAFKA_TOPIC_OCR:parking-ocr-events}
easyspot.gate.kafka.command-topic=${KAFKA_TOPIC_GATE_COMMANDS:parking-gate-commands}
easyspot.gate.kafka.response-topic=${KAFKA_TOPIC_GATE_RESPONSES:parking-gate-responses}
easyspot.gate.kafka.response-group-id=${KAFKA_GATE_RESPONSE_GROUP_ID:easyspot-gate-response}
