spring.security.oauth2.resourceserver.jwt.public-key-location=classpath:postman-test-public.pub
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
cors.allowed-origins=http://localhost:5173
infomatricula.base-url=http://localhost
infomatricula.firebase-api-key=test-key
spring.datasource.url=${POSTMAN_DB_URL:jdbc:postgresql://localhost:5433/easyspot_postman}
spring.datasource.username=${POSTMAN_DB_USER:easyspot}
spring.datasource.password=${POSTMAN_DB_PASS:easyspot}
spring.kafka.bootstrap-servers=${POSTMAN_KAFKA_SERVERS:localhost:9093}
spring.mail.host=localhost
spring.mail.port=1025