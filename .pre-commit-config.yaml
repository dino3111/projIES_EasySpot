repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
      - id: detect-aws-credentials
        args: [--allow-missing-credentials]

  # Python formatting + lint (use ruff for speed; black + isort for formatting)
  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.0.261
    hooks:
      - id: ruff
        args: [--fix]

  - repo: https://github.com/psf/black
    rev: 24.1.0
    hooks:
      - id: black

  - repo: https://github.com/PyCQA/isort
    rev: 5.12.0
    hooks:
      - id: isort
        files: \.(py)$

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.5.1
    hooks:
      - id: mypy
        additional_dependencies:
          - types-requests

  # SQL linter (sqlfluff) - configure dialect in repo .sqlfluff or args
  - repo: https://github.com/sqlfluff/sqlfluff
    rev: 3.5.0
    hooks:
      - id: sqlfluff-lint
        args: ["--dialect", "postgres"]  # change dialect if needed

  # Dockerfile lints
  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
      - id: hadolint-docker

  # Local hook examples for Java formatting or running Maven/Gradle checks.
  # These are 'local' hooks that run commands from the repository (require Java and maven/gradle on PATH)
  - repo: local
    hooks:
      - id: java-format-check
        name: Java format check (maven/gradle)
        entry: bash -c 'if [ -f mvnw ] || [ -f pom.xml ]; then \
          ./mvnw -q -DskipTests -Pformat || \
          mvn -q -DskipTests -Pformat; elif [ -f gradlew ] || \
          [ -f build.gradle ]; then ./gradlew spotlessCheck; \
          else echo "No Java build files found"; fi'
        language: system
        types: [java, xml]
